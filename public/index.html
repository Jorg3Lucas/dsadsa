<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim Site — MIR4</title>
<style>
  /* ============================================
     RESET & BASE
     ============================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-card: #222639;
    --bg-card-hover: #2a2f45;
    --bg-input: #1e2131;
    --border: #2e3348;
    --border-focus: #5865F2;
    --text-primary: #e4e6eb;
    --text-secondary: #9ca3b8;
    --text-muted: #6b7294;
    --color-blurple: #5865F2;
    --color-green: #57F287;
    --color-yellow: #FEE75C;
    --color-red: #ED4245;
    --color-orange: #ff6600;
    --color-claimed: #5865F2;
    --color-available: #57F287;
    --color-killed: #ED4245;
    --color-queue: #FEE75C;
    --gradient-primary: linear-gradient(135deg, #5865F2, #4752c4);
    --gradient-accent: linear-gradient(135deg, #57F287, #3ea86a);
    --shadow-card: 0 4px 20px rgba(0,0,0,0.3);
    --shadow-glow: 0 0 20px rgba(88,101,242,0.15);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --font-mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
    --transition: all 0.2s ease;
  }

  html { font-size: 15px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  a { color: var(--color-blurple); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ============================================
     SCROLLBAR
     ============================================ */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ============================================
     HEADER
     ============================================ */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    width: 36px;
    height: 36px;
    background: var(--gradient-primary);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 18px;
    color: white;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-title span {
    color: var(--text-muted);
    font-weight: 400;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* ============================================
     BUTTONS
     ============================================ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
    font-family: inherit;
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-primary { background: var(--gradient-primary); color: white; }
  .btn-primary:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }

  .btn-success { background: var(--gradient-accent); color: #0f1117; }
  .btn-success:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }

  .btn-danger { background: var(--color-red); color: white; }
  .btn-danger:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover:not(:disabled) { background: var(--bg-card); color: var(--text-primary); }

  .btn-discord {
    background: #5865F2;
    color: white;
    padding: 10px 24px;
    font-size: 15px;
    border-radius: var(--radius-md);
  }
  .btn-discord:hover { filter: brightness(1.1); transform: translateY(-1px); }

  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 4px; }
  .btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 3px; }

  /* ============================================
     USER INFO
     ============================================ */
  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 2px solid var(--border);
  }

  .user-avatar img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  .user-name {
    font-size: 14px;
    font-weight: 600;
  }

  /* ============================================
     MAIN LAYOUT
     ============================================ */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ============================================
     LOGIN OVERLAY
     ============================================ */
  .login-overlay {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    text-align: center;
    gap: 24px;
  }

  .login-overlay h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .login-overlay p {
    color: var(--text-secondary);
    max-width: 480px;
    font-size: 16px;
    line-height: 1.6;
  }

  .login-overlay .icon-big {
    font-size: 64px;
    margin-bottom: 8px;
  }

  /* ============================================
     USER DASHBOARD
     ============================================ */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  @media (min-width: 768px) {
    .dashboard {
      grid-template-columns: 1fr 1fr;
    }
  }

  .dashboard-card {
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    border: 1px solid var(--border);
  }

  .dashboard-card h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .dashboard-card .empty-state {
    color: var(--text-muted);
    font-size: 13px;
  }

  .claim-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    margin: 2px 4px 2px 0;
    white-space: nowrap;
  }

  .claim-chip .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .claim-chip .dot.claimed { background: var(--color-claimed); }
  .claim-chip .dot.queue { background: var(--color-queue); }

  /* ============================================
     PANEL SECTIONS
     ============================================ */
  .panel-section {
    margin-bottom: 32px;
  }

  .panel-section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .panel-section-header h2 {
    font-size: 18px;
    font-weight: 700;
  }

  .panel-section-header .badge {
    background: var(--bg-card);
    color: var(--text-secondary);
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  /* ============================================
     PANEL CARDS
     ============================================ */
  .panel-grid {
    display: grid;
    gap: 12px;
  }

  @media (min-width: 640px) {
    .panel-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1024px) {
    .panel-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 1280px) {
    .panel-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .panel-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    transition: var(--transition);
  }

  .panel-card:hover {
    border-color: var(--border-focus);
    box-shadow: var(--shadow-glow);
  }

  .panel-card-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .panel-card-title {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel-card-body {
    padding: 12px 16px;
  }

  /* ============================================
     STATUS BADGES
     ============================================ */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .status-badge.available {
    background: rgba(87, 242, 135, 0.12);
    color: var(--color-available);
  }

  .status-badge.claimed {
    background: rgba(88, 101, 242, 0.15);
    color: var(--color-claimed);
  }

  .status-badge.killed {
    background: rgba(237, 66, 69, 0.12);
    color: var(--color-killed);
  }

  .status-badge.queue {
    background: rgba(254, 231, 92, 0.12);
    color: var(--color-queue);
  }

  /* ============================================
     ROOM LIST (within panel cards)
     ============================================ */
  .room-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .room-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 8px;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }

  .room-item .room-name {
    font-weight: 500;
    flex-shrink: 0;
  }

  .room-item .room-status {
    flex: 1;
    text-align: left;
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .room-item .room-status .owner {
    color: var(--color-claimed);
    font-weight: 600;
  }

  .room-item .room-status .queue-name {
    color: var(--color-queue);
    font-size: 11px;
  }

  .room-item .room-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  .room-item.claimed {
    border-left: 3px solid var(--color-claimed);
  }

  .room-item.available {
    border-left: 3px solid var(--color-available);
  }

  .room-item.killed {
    border-left: 3px solid var(--color-killed);
  }

  .room-item.queued {
    border-left: 3px solid var(--color-queue);
  }

  /* ============================================
     TICKET MODAL
     ============================================ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    max-width: 420px;
    width: 90%;
    box-shadow: var(--shadow-card);
  }

  .modal h2 {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .modal p {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 20px;
  }

  .ticket-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .ticket-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: var(--transition);
  }

  .ticket-option:hover {
    border-color: var(--border-focus);
  }

  .ticket-option.selected {
    border-color: var(--color-blurple);
    background: rgba(88,101,242,0.08);
  }

  .ticket-option .radio {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ticket-option.selected .radio {
    border-color: var(--color-blurple);
  }

  .ticket-option.selected .radio::after {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--color-blurple);
  }

  .ticket-option .ticket-label {
    font-weight: 600;
    font-size: 14px;
  }

  .ticket-option .ticket-desc {
    color: var(--text-muted);
    font-size: 12px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ============================================
     TOAST NOTIFICATIONS
     ============================================ */
  .toast-container {
    position: fixed;
    top: 80px;
    right: 24px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 380px;
  }

  .toast {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    font-size: 14px;
    box-shadow: var(--shadow-card);
    animation: slideIn 0.3s ease;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .toast.success { border-left: 3px solid var(--color-green); }
  .toast.error { border-left: 3px solid var(--color-red); }
  .toast.info { border-left: 3px solid var(--color-blurple); }

  .toast .toast-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .toast .toast-msg { flex: 1; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ============================================
     LOADING
     ============================================ */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    color: var(--text-muted);
    gap: 12px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--color-blurple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============================================
     TOOLBAR / FILTERS
     ============================================ */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
  }

  .filter-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .filter-btn.active { background: var(--color-blurple); color: white; border-color: var(--color-blurple); }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width: 640px) {
    .header-title span { display: none; }
    .main { padding: 16px; }
    .modal { padding: 20px; width: 95%; }
    .toast-container { left: 16px; right: 16px; max-width: none; }
  }
</style>
</head>
<body>

<!-- ========== HEADER ========== -->
<header class="header" id="header">
  <div class="header-left">
    <div class="header-logo">⚔</div>
    <div class="header-title">Claim <span>Dashboard</span></div>
  </div>
  <div class="header-right" id="headerRight">
    <div id="userInfo"></div>
    <button class="btn btn-discord" id="loginBtn" onclick="loginDiscord()" style="display:none">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
      Login with Discord
    </button>
  </div>
</header>

<!-- ========== MAIN CONTENT ========== -->
<main class="main" id="mainContent">
  <div class="loading" id="loadingIndicator">
    <div class="spinner"></div>
    <span>Loading panels...</span>
  </div>
</main>

<!-- ========== TICKET MODAL ========== -->
<div class="modal-overlay" id="ticketModal">
  <div class="modal">
    <h2 id="modalTitle">🎫 Select Tickets</h2>
    <p id="modalDesc">Choose how many tickets to use for this room.</p>
    <div class="ticket-options" id="ticketOptions">
      <label class="ticket-option" data-value="1">
        <div class="radio"></div>
        <div>
          <div class="ticket-label">🎫 1 Ticket</div>
          <div class="ticket-desc">30 minutes claim time</div>
        </div>
      </label>
      <label class="ticket-option" data-value="2">
        <div class="radio"></div>
        <div>
          <div class="ticket-label">🎫🎫 2 Tickets</div>
          <div class="ticket-desc">60 minutes claim time</div>
        </div>
      </label>
      <label class="ticket-option" data-value="3">
        <div class="radio"></div>
        <div>
          <div class="ticket-label">🎫🎫🎫 3 Tickets</div>
          <div class="ticket-desc">90 minutes claim time</div>
        </div>
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeTicketModal()">Cancel</button>
      <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmTicket()">Confirm</button>
    </div>
  </div>
</div>

<!-- ========== TOAST CONTAINER ========== -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================
// STATE
// ============================================
let state = {
  authenticated: false,
  user: null,
  panels: {},
  activeClaims: [],
  activeQueues: [],
  punishment: null,
  filter: 'all'
};

let pendingAction = null; // For ticket modal callback

// ============================================
// HELPERS
// ============================================
function $(id) { return document.getElementById(id); }

function showToast(message, type = 'info') {
  const container = $('toastContainer');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-icon">${icons[type] || 'ℹ️'}</span><span class="toast-msg">${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(20px)'; toast.style.transition = 'all 0.3s ease'; setTimeout(() => toast.remove(), 300); }, 4000);
}

function loginDiscord() {
  window.location.href = '/auth/discord';
}

function logout() {
  window.location.href = '/auth/logout';
}

async function apiCall(url, options = {}) {
  try {
    const resp = await fetch(url, {
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...options.headers },
      ...options
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Request failed');
    return data;
  } catch (err) {
    if (err.message.includes('401') || err.message.includes('Not authenticated')) {
      state.authenticated = false;
      render();
    }
    throw err;
  }
}

function timeAgo(timestamp) {
  if (!timestamp) return '';
  const diff = Date.now() - timestamp;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  const remMins = mins % 60;
  return remMins > 0 ? `${hrs}h ${remMins}m ago` : `${hrs}h ago`;
}

function getStatusClass(status) {
  if (!status) return 'available';
  if (status.startsWith('🔴 Claimed') || status.startsWith('🔴 Killed')) return 'claimed';
  if (status.startsWith('🟢')) return 'available';
  if (status.startsWith('🔴')) return 'killed';
  return 'available';
}

function formatTimeWindow(tw) {
  if (!tw) return '';
  return tw;
}

// ============================================
// TICKET MODAL
// ============================================
let selectedTickets = 1;

function openTicketModal(title, desc, callback) {
  pendingAction = callback;
  $('modalTitle').textContent = title;
  $('modalDesc').textContent = desc;
  selectedTickets = 1;
  document.querySelectorAll('.ticket-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.value == 1);
  });
  $('ticketModal').classList.add('active');
}

function closeTicketModal() {
  $('ticketModal').classList.remove('active');
  pendingAction = null;
}

document.querySelectorAll('.ticket-option').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.ticket-option').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedTickets = parseInt(el.dataset.value);
  });
});

function confirmTicket() {
  if (pendingAction) {
    pendingAction(selectedTickets);
    pendingAction = null;
  }
  closeTicketModal();
}

// Close modal on overlay click
$('ticketModal').addEventListener('click', (e) => {
  if (e.target === $('ticketModal')) closeTicketModal();
});

// ============================================
// DATA FETCHING
// ============================================
async function loadPanels() {
  try {
    const data = await apiCall('/api/panels');
    state.panels = data.panels;
  } catch (err) {
    console.error('Failed to load panels:', err);
    showToast('Failed to load panels: ' + err.message, 'error');
  }
}

async function loadUserData() {
  try {
    const data = await apiCall('/api/user/me');
    state.authenticated = true;
    state.user = data.user;
    state.activeClaims = data.activeClaims || [];
    state.activeQueues = data.activeQueues || [];
    state.punishment = data.punishment;
  } catch {
    state.authenticated = false;
    state.user = null;
  }
}

// ============================================
// RENDER
// ============================================
function render() {
  const main = $('mainContent');
  const headerRight = $('headerRight');
  const loginBtn = $('loginBtn');
  const userInfo = $('userInfo');

  // Render header
  if (state.authenticated && state.user) {
    loginBtn.style.display = 'none';
    userInfo.innerHTML = `
      <div class="user-info">
        <div class="user-avatar">
          <img src="https://cdn.discordapp.com/avatars/${state.user.id}/${state.user.avatar}.png?size=64" alt="" onerror="this.parentElement.innerHTML='<div style=\\'width:32px;height:32px;border-radius:50%;background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:14px\\'>👤</div>'">
        </div>
        <span class="user-name">${escHtml(state.user.username)}</span>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
      </div>
    `;
  } else {
    loginBtn.style.display = 'flex';
    userInfo.innerHTML = '';
  }

  // Check auth panels
  if (!state.authenticated) {
    main.innerHTML = `
      <div class="login-overlay">
        <div class="icon-big">⚔️</div>
        <h1>Claim Dashboard</h1>
        <p>Manage your MIR4 claims directly from your browser. Login with Discord to view and claim floors, antidemon rooms, summons, and events.</p>
        <button class="btn btn-discord" onclick="loginDiscord()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
          Login with Discord
        </button>
        <p style="font-size:13px;color:var(--text-muted);margin-top:8px;">
          Don't have Discord? Get the app at <a href="https://discord.com" target="_blank">discord.com</a>
        </p>
      </div>
    `;
    return;
  }

  // Render dashboard + panels
  let html = '';

  // User dashboard
  html += `
    <div class="dashboard">
      <div class="dashboard-card">
        <h3>🎯 Your Active Claims</h3>
        ${state.activeClaims.length > 0
          ? state.activeClaims.map(c => `<span class="claim-chip"><span class="dot claimed"></span>${escHtml(c.title)}</span>`).join('')
          : '<span class="empty-state">No active claims</span>'
        }
      </div>
      <div class="dashboard-card">
        <h3>⏭️ Your Queue Positions</h3>
        ${state.activeQueues.length > 0
          ? state.activeQueues.map(c => `<span class="claim-chip"><span class="dot queue"></span>${escHtml(c.title)}</span>`).join('')
          : '<span class="empty-state">No queue positions</span>'
        }
        ${state.punishment ? `<div style="margin-top:8px;color:var(--color-red);font-size:13px">⏳ ${escHtml(state.punishment)}</div>` : ''}
      </div>
    </div>
  `;

  // Filter toolbar
  const panelTypes = ['all', 'peak', 'normal', 'antidemon', 'summon', 'event_group', 'fixed'];
  html += `<div class="toolbar">`;
  panelTypes.forEach(type => {
    const label = type === 'all' ? 'All' : type.charAt(0).toUpperCase() + type.slice(1).replace('_', ' ');
    html += `<button class="filter-btn ${state.filter === type ? 'active' : ''}" onclick="setFilter('${type}')">${label}</button>`;
  });
  html += `</div>`;

  // Group panels by type
  const groups = {};
  for (const [key, panel] of Object.entries(state.panels)) {
    const type = panel.type;
    if (!groups[type]) groups[type] = [];
    groups[type].push({ key, ...panel });
  }

  // Sort types
  const typeOrder = ['peak', 'normal', 'antidemon', 'summon', 'event_group', 'fixed'];
  const typeLabels = {
    peak: '🏔️ Secret Peak Floors',
    normal: '🔮 Magic Square Floors',
    antidemon: '👹 Antidemon Rooms',
    summon: '🌀 Summon Locations',
    event_group: '🎯 Events (Fury / Frenzy / Red Boss)',
    fixed: '🎲 Random Events'
  };

  typeOrder.forEach(type => {
    if (state.filter !== 'all' && state.filter !== type) return;
    const panels = (groups[type] || []).sort((a, b) => a.key.localeCompare(b.key));
    if (panels.length === 0) return;

    html += `<div class="panel-section">
      <div class="panel-section-header">
        <h2>${typeLabels[type] || type}</h2>
        <span class="badge">${panels.length}</span>
      </div>
      <div class="panel-grid">
    `;

    panels.forEach(panel => {
      html += renderPanelCard(panel);
    });

    html += `</div></div>`;
  });

  main.innerHTML = html;
}

function renderPanelCard(panel) {
  let bodyHtml = '';

  if (panel.type === 'event_group' && panel.events) {
    // Show each event
    const events = Object.entries(panel.events);
    bodyHtml = `<div class="room-list">`;
    events.forEach(([evKey, ev]) => {
      const isClaimed = !!ev.ownerId;
      const isMine = state.authenticated && ev.ownerId === state.user.id;
      const statusClass = isClaimed ? 'claimed' : 'available';
      const statusText = isClaimed ? `👑 ${escHtml(ev.ownerName)}` : '🟢 Available';
      
      bodyHtml += `<div class="room-item ${statusClass}">
        <span class="room-name">${escHtml(ev.name)}</span>
        <span class="room-status">${statusText}${ev.timeWindow ? ' · ' + escHtml(ev.timeWindow) : ''}</span>
        <span class="room-actions">
          ${isClaimed && isMine ? `<button class="btn btn-danger btn-xs" onclick="cancelClaim('${panel.key}','${evKey}')">🚪 Leave</button>` : ''}
          ${!isClaimed && state.authenticated ? `<button class="btn btn-success btn-xs" onclick="claimEvent('${panel.key}','${evKey}','${ev.type}')">⚔️ Claim</button>` : ''}
          ${isClaimed && !isMine && !ev.nextId && ev.type === 'summon' && state.authenticated ? `<button class="btn btn-primary btn-xs" onclick="joinQueue('${panel.key}','${evKey}')">⏭️ Queue</button>` : ''}
        </span>
      </div>`;
    });
    bodyHtml += `</div>`;
  } else if ((panel.type === 'antidemon' || panel.type === 'summon') && panel.rooms) {
    const rooms = Object.entries(panel.rooms);
    bodyHtml = `<div class="room-list">`;
    rooms.forEach(([rmKey, rm]) => {
      const isClaimed = !!rm.ownerId;
      const isMine = state.authenticated && rm.ownerId === state.user.id;
      const statusClass = isClaimed ? 'claimed' : 'available';
      const statusText = isClaimed ? `👑 ${escHtml(rm.ownerName)}` : '🟢 Available';
      const queueText = rm.nextName ? ` ⏭️ ${escHtml(rm.nextName)}` : '';
      
      bodyHtml += `<div class="room-item ${statusClass}">
        <span class="room-name">${escHtml(rm.name)}</span>
        <span class="room-status">${statusText}${queueText}${rm.timeWindow ? ' · ' + escHtml(rm.timeWindow) : ''}</span>
        <span class="room-actions">
          ${isClaimed && isMine ? `<button class="btn btn-danger btn-xs" onclick="cancelClaim('${panel.key}','${rmKey}')">🚪 Leave</button>` : ''}
          ${!isClaimed && state.authenticated ? `<button class="btn btn-success btn-xs" onclick="claimRoom('${panel.key}','${rmKey}','${panel.type}')">⚔️ Claim</button>` : ''}
          ${isClaimed && !isMine && !rm.nextId && state.authenticated ? `<button class="btn btn-primary btn-xs" onclick="joinQueue('${panel.key}','${rmKey}')">⏭️ Queue</button>` : ''}
        </span>
      </div>`;
    });
    bodyHtml += `</div>`;
  } else if (panel.type === 'peak' || panel.type === 'normal') {
    // Floor panels with bosses
    const rooms = Object.entries(panel.rooms);
    const isClaimed = !!panel.ownerId;
    const isMine = state.authenticated && panel.ownerId === state.user.id;
    const globalStatus = panel.ownerName ? `👑 ${escHtml(panel.ownerName)}` : '🟢 Available';

    bodyHtml = `<div style="margin-bottom:8px;font-size:13px;color:var(--text-secondary)">
      <strong>${globalStatus}</strong>${panel.timeWindow ? ' · ' + escHtml(panel.timeWindow) : ''}
    </div>
    <div class="room-list">`;
    rooms.forEach(([bossKey, boss]) => {
      const bossStatusClass = getStatusClass(boss.status);
      const bossTimeDisplay = boss._freeSince > 0 ? ' · ' + timeAgo(boss._freeSince) : (boss._lastKilledAt > 0 ? ' · ' + timeAgo(boss._lastKilledAt) : '');
      
      bodyHtml += `<div class="room-item ${bossStatusClass}">
        <span class="room-name">${escHtml(boss.name)}</span>
        <span class="room-status">${escHtml(boss.status || '')}${bossTimeDisplay}</span>
      </div>`;
    });
    bodyHtml += `</div>`;

    // Floor actions
    bodyHtml += `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">`;
    if (!isClaimed && state.authenticated && panel.type !== 'peak') {
      bodyHtml += `<button class="btn btn-success btn-sm" onclick="claimFloor('${panel.key}')">⚔️ Claim</button>`;
    }
    if (isClaimed && isMine) {
      bodyHtml += `<button class="btn btn-danger btn-sm" onclick="cancelClaim('${panel.key}')">🚪 Leave</button>`;
    }
    if (isClaimed && !isMine && !panel.hasQueue && state.authenticated && panel.type !== 'peak') {
      bodyHtml += `<button class="btn btn-primary btn-sm" onclick="joinQueue('${panel.key}')">⏭️ Join Queue</button>`;
    }
    bodyHtml += `</div>`;
  } else if (panel.type === 'fixed') {
    // Fixed event (Random Event, etc.)
    const isClaimed = !!panel.ownerId;
    const isMine = state.authenticated && panel.ownerId === state.user.id;
    bodyHtml = `
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">
        ${isClaimed ? `👑 ${escHtml(panel.ownerName)}${panel.timeWindow ? ' · ' + escHtml(panel.timeWindow) : ''}` : '🟢 Available'}
      </div>
      <div style="display:flex;gap:6px">
        ${!isClaimed && state.authenticated ? `<button class="btn btn-success btn-sm" onclick="claimFloor('${panel.key}')">⚔️ Claim</button>` : ''}
        ${isClaimed && isMine ? `<button class="btn btn-danger btn-sm" onclick="cancelClaim('${panel.key}')">🚪 Leave</button>` : ''}
      </div>
    `;
  }

  // Card wrapper
  let cardStatus = 'available';
  if (panel.ownerId) cardStatus = 'claimed';
  else if (panel.hasQueue) cardStatus = 'queue';

  return `
    <div class="panel-card">
      <div class="panel-card-header">
        <span class="panel-card-title" title="${escHtml(panel.title)}">${escHtml(panel.title)}</span>
        <span class="status-badge ${cardStatus}">
          ${cardStatus === 'claimed' ? '👑 Claimed' : cardStatus === 'queue' ? '⏭️ Queue' : '🟢 Free'}
        </span>
      </div>
      <div class="panel-card-body">
        ${bodyHtml}
      </div>
    </div>
  `;
}

function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================
// ACTIONS
// ============================================
function setFilter(type) {
  state.filter = type;
  render();
}

async function claimFloor(panelKey) {
  try {
    const data = await apiCall('/api/claim/floor', {
      method: 'POST',
      body: JSON.stringify({ panelKey })
    });
    showToast(data.message || 'Floor claimed!', 'success');
    await refresh();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function claimRoom(panelKey, roomKey, type) {
  openTicketModal('🎫 Select Tickets', `Choose tickets for this ${type} room.`, async (tickets) => {
    try {
      const endpoint = type === 'summon' ? '/api/claim/summon' : '/api/claim/antidemon';
      const data = await apiCall(endpoint, {
        method: 'POST',
        body: JSON.stringify({ panelKey, roomKey, tickets })
      });
      showToast(data.message || 'Room claimed!', 'success');
      await refresh();
    } catch (err) {
      showToast(err.message, 'error');
    }
  });
}

async function claimEvent(panelKey, eventKey, eventType) {
  if (eventType === 'summon') {
    openTicketModal('🎫 Select Tickets', 'Choose tickets for this summon event.', async (tickets) => {
      try {
        const data = await apiCall('/api/claim/event', {
          method: 'POST',
          body: JSON.stringify({ panelKey, eventKey, tickets })
        });
        showToast(data.message || 'Event claimed!', 'success');
        await refresh();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  } else {
    try {
      const data = await apiCall('/api/claim/event', {
        method: 'POST',
        body: JSON.stringify({ panelKey, eventKey })
      });
      showToast(data.message || 'Event claimed!', 'success');
      await refresh();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }
}

async function cancelClaim(panelKey, roomKey) {
  if (!confirm('Cancel this claim/queue position?')) return;
  try {
    const data = await apiCall('/api/cancel', {
      method: 'POST',
      body: JSON.stringify({ panelKey, roomKey: roomKey || null })
    });
    showToast(data.message || 'Canceled!', 'success');
    await refresh();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function joinQueue(panelKey, roomKey) {
  try {
    const data = await apiCall('/api/queue/join', {
      method: 'POST',
      body: JSON.stringify({ panelKey, roomKey: roomKey || null })
    });
    showToast(data.message || 'Queue joined!', 'success');
    await refresh();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function refresh() {
  $('mainContent').innerHTML = `<div class="loading"><div class="spinner"></div><span>Refreshing...</span></div>`;
  await Promise.all([loadUserData(), loadPanels()]);
  render();
}

// ============================================
// INIT
// ============================================
async function init() {
  await loadUserData();
  await loadPanels();
  render();

  // Auto-refresh every 15 seconds
  setInterval(async () => {
    await loadPanels();
    render();
  }, 15000);
}

init();
</script>
